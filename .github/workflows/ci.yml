name: CI/CD Pipeline

# ============================================================================
# CI/CD Pipeline Orchestrator
# ============================================================================
# This is the main CI/CD pipeline that orchestrates smaller, modular workflows.
# Each workflow can also be run independently for better maintainability.
#
# Workflow Structure:
# ├── quality.yml     - Code quality checks (ruff, mypy, pre-commit)
# ├── test.yml        - Test suite with coverage
# ├── build-docker.yml - Docker image builds (CPU/GPU)
# └── release.yml     - GitHub release creation (triggered by version tags)
#
# This workflow works OUT-OF-THE-BOX without requiring any secrets.
# ============================================================================

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Code Quality Checks
  quality:
    name: Quality
    uses: ./.github/workflows/quality.yml

  # Step 2: Test Suite & Coverage
  test:
    name: Test
    permissions:
      contents: read
      pull-requests: write
      checks: write
    uses: ./.github/workflows/test.yml

  # Step 3: Build Docker Images (after all checks pass)
  build-docker:
    name: Build Docker
    needs: [quality, test]
    uses: ./.github/workflows/build-docker.yml
